name: spectral-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: spectral-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - spectral-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: spectral-redis-local
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - spectral-redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: spectral-minio-local
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - spectral-minio-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: spectral-minio-init-local
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      R2_BUCKET: ${R2_BUCKET}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing "local/$R2_BUCKET"
        mc anonymous set download "local/$R2_BUCKET"

volumes:
  spectral-postgres-data:
    name: spectral-postgres-data
  spectral-redis-data:
    name: spectral-redis-data
  spectral-minio-data:
    name: spectral-minio-data
